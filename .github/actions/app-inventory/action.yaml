---
# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Application Inventory
description: Return a JSON array of app names from the apps directory

outputs:
  apps:
    description: Application Inventory
    value: ${{ steps.inventory.outputs.apps }}
  images:
    description: Container image inventory
    value: ${{ steps.inventory.outputs.images }}

runs:
  using: composite
  steps:
    - name: Application Inventory
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      id: inventory
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          function scanDirectory(path) {
              try {
                  const entries = fs.readdirSync(path, { withFileTypes: true });
                  const folderNames = entries
                      .filter((entry) => entry.isDirectory())
                      .map((entry) => entry.name);
                  return folderNames;
              } catch (error) {
                  core.setFailed(`Error reading directory ${path}: ${error.message}`);
                  return [];
              }
          }

          function imagesForApp(app) {
              const configPath = path.resolve(process.cwd(), 'apps', app, 'images.yaml');
              if (!fs.existsSync(configPath)) {
                  return [{ app, name: app, target: 'image', tests: 'tests.yaml' }];
              }

              const { execFileSync } = require('child_process');
              const config = JSON.parse(execFileSync('yq', ['--output-format=json', '.', configPath], { encoding: 'utf8' }));
              if (!Array.isArray(config.images) || config.images.length === 0) {
                  throw new Error(`${configPath} must contain a non-empty images array`);
              }

              return config.images.map((image) => {
                  if (!image.name) {
                      throw new Error(`Every image in ${configPath} must include a name`);
                  }

                  return {
                      app,
                      name: image.name,
                      target: image.target || 'image',
                      tests: image.tests || 'tests.yaml',
                  };
              });
          }

          const appsDirectory = path.resolve(process.cwd(), 'apps');
          const apps = scanDirectory(appsDirectory).sort();
          const images = apps.flatMap(imagesForApp);
          core.setOutput('apps', JSON.stringify(apps));
          core.setOutput('images', JSON.stringify(images));
