---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Retry Release

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apps:
    name: Get App Inventory
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.inventory.outputs.apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Get App Inventory
        uses: ./.github/actions/app-inventory
        id: inventory

  retry:
    if: ${{ needs.apps.outputs.apps != '[]' }}
    name: Retry Release
    runs-on: ubuntu-latest
    needs: ["apps"]
    strategy:
      matrix:
        app: ${{ fromJSON(needs.apps.outputs.apps) }}
      max-parallel: 4
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install regctl
        uses: regclient/actions/regctl-installer@c48159175b58fb90cccd0f98410927a81e04a166 # main

      - name: Get Bake Options
        id: app-options
        uses: ./.github/actions/app-options
        with:
          app: ${{ matrix.app }}

      - name: Get Application Images
        id: app-images
        uses: ./.github/actions/app-images
        with:
          app: ${{ matrix.app }}

      - name: Get Container Registry Versions
        id: registry
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGES: ${{ steps.app-images.outputs.images }}
          EXPECTED_VERSION: ${{ steps.app-options.outputs.version }}
        run: |
          mismatch=false

          {
              echo 'summary<<EOF'
              echo '| Container Name | Actual Version | Expected Version |'
              echo '|----------------|----------------|------------------|'
          } >> "${GITHUB_OUTPUT}"

          while read -r image; do
              if ! version=$(regctl image inspect "ghcr.io/${{ github.repository_owner }}/${image}:rolling" \
                  | jq --raw-output '.config.Labels["org.opencontainers.image.version"]' 2>/dev/null) || [[ -z "${version}" ]];
              then
                  echo "Failed to get registry version for ${image}"
                  exit 1
              fi

              if [[ "${version}" != "${EXPECTED_VERSION}" ]]; then
                  mismatch=true
              fi

              echo "| \`${image}\` | \`${version}\` | \`${EXPECTED_VERSION}\` |" >> "${GITHUB_OUTPUT}"
          done < <(jq --raw-output '.[].name' <<< "${IMAGES}")

          {
              echo 'EOF'
              echo "mismatch=${mismatch}"
          } >> "${GITHUB_OUTPUT}"

      - if: ${{ steps.registry.outputs.mismatch == 'true' }}
        name: Find Pull Request
        uses: juliangruber/find-pull-request-action@92b38d91ef26fd0f47374257f50e78432359a45f # v1.11.1
        id: find-pull-request
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          labels: app/${{ matrix.app }}
          state: open

      - if: ${{ steps.find-pull-request.outputs.number != '' }}
        name: Retry Release
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          SUMMARY: ${{ steps.registry.outputs.summary }}
        run: | # zizmor: ignore[template-injection]
          gh workflow run release.yaml \
              --repo "${{ github.repository }}" \
              -f app="${{ matrix.app }}" \
              -f release=true

          {
              echo '## Retrying Release'
              echo
              echo "${SUMMARY}"
          } >> "${GITHUB_STEP_SUMMARY}"
